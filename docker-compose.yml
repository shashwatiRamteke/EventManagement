version: '3.8'

# EventManagementApi2 with Ticket Purchase System - Docker Compose
# Fully configured for production deployment

services:
  # Main API Service with Events and Tickets
  eventapi:
    image: eventmanagementapi:2.0
    container_name: eventapi-prod

    # Port mappings
    ports:
      - "5000:80"      # HTTP traffic
      - "8080:8080"    # HTTPS alternative

    # Environment variables
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft__AspNetCore: Warning
      Logging__LogLevel__Microsoft__EntityFrameworkCore: Warning
      AllowedHosts: "*"

    # Restart policy
    restart: unless-stopped

    # Health checks
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Depends on (if database service added)
    depends_on:
      - redis  # Optional: for caching

    # Networks
    networks:
      - api-network

  # Optional: Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: redis-cache

    ports:
      - "6379:6379"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

    command:
      - redis-server
      - "--appendonly"
      - "yes"
      - "--requirepass"
      - "redis-password"

    volumes:
      - redis_data:/data

    networks:
      - api-network

  # Optional: Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

    restart: unless-stopped

    depends_on:
      - eventapi

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

    networks:
      - api-network

# Volumes for data persistence
volumes:
  redis_data:
    driver: local

# Custom network for service communication
networks:
  api-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
